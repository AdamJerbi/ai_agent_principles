apiVersion: apps/v1
kind: Deployment
metadata:
  name: document-mcp
spec:
  replicas: 2
  selector:
    matchLabels:
      app: document-mcp
  template:
    metadata:
      labels:
        app: document-mcp
    spec:
      containers:
        - name: mcp
          image: document-mcp:latest
---
apiVersion: v1
kind: Service
metadata:
  name: document-mcp
spec:
  type: ClusterIP
  selector:
    app: document-mcp
  ports:
    - port: 8080
      targetPort: 8080
